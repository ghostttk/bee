<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para a Bia 🦭</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #2e1a47; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #heartCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .container { background-color: #4a2c7a; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(123, 0, 255, 0.3); text-align: center; max-width: 400px; width: 90%; border: 1px solid #6b3fa0; position: relative; z-index: 2; }
        h2 { color: #ff9a9e; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #8e44ad; background-color: #2e1a47; color: white; font-size: 16px; box-sizing: border-box; }
        button { background-color: #9b59b6; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; }
        .step { display: none; } .active { display: block; }
        .error { color: #ff6b6b; font-size: 14px; margin-top: 5px; display: none; }
        #hintImg { width: 100%; margin-top: 15px; border-radius: 10px; display: none; }
        .final-card { font-size: 24px; font-weight: bold; color: #ff9a9e; animation: heartbeat 1.2s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<div class="container">
    <div id="step1" class="step active">
        <h2>Pergunta 1</h2>
        <p>Qual é a data do meu aniversário?</p>
        <input type="date" id="ans1">
        <button onclick="checkStep1()">Próxima</button>
        <p id="err1" class="error">Data incorreta! 👀</p>
    </div>

    <div id="step2" class="step">
        <h2>Pergunta 2</h2>
        <p>Qual é a coisa mais linda que eu já vi?</p>
        <input type="text" id="ans2" placeholder="Digite aqui...">
        <button onclick="checkStep2()">Verificar</button>
        <button id="hintBtn" onclick="showHint()" style="background-color: #7f8c8d;">Dica?</button>
        <img id="hintImg" src="https://raw.githubusercontent.com/ghostttk/bee/refs/heads/main/Screenshot_20260705_004548_Instagram.jpg" alt="Dica">
        <p id="err2" class="error">Tente de novo! 👀</p>
    </div>

    <div id="stepFinal" class="step">
        <div class="final-card">
            <p>Te amo, Bia ❤️</p>
            <p style="font-size: 16px; color: #dcdde1;">Perdi uns minutos nisso, mas valeu a pena.</p>
        </div>
    </div>
</div>

<script>
    function checkStep1() {
        if (document.getElementById('ans1').value === "2012-05-20") {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        } else { document.getElementById('err1').style.display = 'block'; }
    }

    function checkStep2() {
        const ans = document.getElementById('ans2').value.trim().toLowerCase();
        if (ans.includes("olhos") || ans.includes("seus olhos")) {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('stepFinal').classList.add('active');
        } else { document.getElementById('err2').style.display = 'block'; }
    }

    function showHint() { document.getElementById('hintImg').style.display = 'block'; }

    // --- CANVAS EMOJI CORAÇÃO ---
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const hearts = [];
    class Heart {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*-canvas.height; this.size = Math.random()*20+15; this.speed = Math.random()*2+1; }
        draw() { ctx.font = `${this.size}px Arial`; ctx.fillText('❤️', this.x, this.y); }
        update() { this.y += this.speed; if(this.y > canvas.height) this.y = -20; }
    }
    for(let i=0; i<30; i++) hearts.push(new Heart());
    function animate() { ctx.clearRect(0,0,canvas.width,canvas.height); hearts.forEach(h => { h.update(); h.draw(); }); requestAnimationFrame(animate); }
    animate();
</script>

</body>
</html>
